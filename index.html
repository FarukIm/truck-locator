<!doctype html>
<html lang="en">
  <head>
    <title>Taco Truck Locator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="styles/styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script defer src="scripts/scripts.js"></script>
  </head>
  <body>
    <header
      class="site-header d-flex align-items-center justify-content-between mx-auto p-2 pb-2 bg-dark bg-md-white"
    >
      <button
        class="d-md-none btn p-0 border-0 bg-transparent"
        type="button"
        aria-label="Open menu"
      >
        <i
          class="fa-solid fa-bars mobile-menu-icon fa-xl"
          style="color: white"
        ></i>
      </button>
      <div class="d-inline-flex">
        <img
          class="d-none d-md-inline-block"
          src="assets/rioseo-logo.png"
          alt="Rio SEO"
          aria-label="Rio SEO"
        />
        <img
          class="d-md-none"
          src="assets/rioseo-logo-mobile.png"
          alt="Rio SEO"
          aria-label="Rio SEO"
        />
      </div>
      <nav
        class="d-none d-md-inline-block site-nav d-flex align-items-center gap-4 small"
        aria-label="Primary"
      >
        <span class="cursor-pointer">Menu</span>
        <span class="d-inline-flex align-items-center ms-5 cursor-pointer">
          <i class="fa-solid fa-location-dot"></i>
          <span>Truck Locator</span>
        </span>
      </nav>
      <button
        class="d-md-none p-0 border-0 bg-transparent"
        type="button"
        aria-label="Truck locator"
      >
        <i class="fa-solid fa-location-dot fa-xl" style="color: white"></i>
      </button>
    </header>

    <main class="locator mx-auto w-100">
      <div class="d-none d-md-block mb-4 mt-5">
        <h1 id="summary-title" class="fw-normal text-body-emphasis mb-1">
          Loading taco trucks...
        </h1>
      </div>

      <div class="locator__content">
        <section class="panel" id="list-panel" aria-label="Truck locations">
          <div class="h-100 d-flex flex-column">
            <div
              class="alert alert-warning rounded-0 border-0 mb-0 py-2 px-3 d-none d-md-none"
              id="locations-error"
              role="status"
              aria-live="polite"
            ></div>
            <div
              class="locations-status--loading text-center text-body-secondary lh-lg"
              id="locations-status"
              role="status"
              aria-live="polite"
            >
              <div class="map-loading__spinner" aria-hidden="true"></div>
              <p class="mb-0">Loading locations...</p>
            </div>
            <div
              class="locations-list d-flex flex-column gap-3 overflow-auto p-3"
              id="locations-list"
            ></div>
          </div>
        </section>

        <section class="panel" id="map-panel" aria-label="Map">
          <div class="h-100 position-relative">
            <div class="map-shell h-100">
              <div class="map-stage overflow-hidden h-100" id="map-stage">
                <div
                  class="d-flex flex-column align-items-center justify-content-center gap-3 h-100 p-4 text-center"
                >
                  <p>Click a location card to load a map.</p>
                </div>
              </div>
            </div>
            <div class="modal fade" id="details-overlay">
              <div class="modal-dialog w-100 h-100">
                <div id="details-card"></div>
              </div>
            </div>
          </div>
          <button
            id="map-details-button"
            type="button"
            class="d-md-none btn btn-primary text-uppercase"
            hidden
          >
            View Details
          </button>
        </section>
      </div>
    </main>

    <nav
      class="mobile-tabs navbar fixed-bottom d-md-none p-0"
      aria-label="Mobile view switcher"
    >
      <div class="container-fluid px-0">
        <div class="navbar-nav flex-row w-100">
          <button
            class="mobile-tabs__button nav-link flex-fill text-center py-3 px-0 mobile-tabs__button--active"
            data-view="list"
            type="button"
          >
            List
          </button>
          <button
            class="mobile-tabs__button nav-link flex-fill text-center py-3 px-0"
            data-view="map"
            type="button"
          >
            Map
          </button>
        </div>
      </div>
    </nav>
  </body>
</html>
